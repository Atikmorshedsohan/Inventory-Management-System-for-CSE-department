<!doctype html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CSE Inventory — Reset Password</title>
  <link rel="stylesheet" href="{% static 'css/reset-password.css' %}">
</head>
<body>
  <div class="card">
    <div class="icon">🔑</div>
    <h1>Reset Password</h1>
    <p class="lead">Enter your new password below. Make sure it's strong and secure.</p>
    
    <div id="error" class="error"></div>
    <div id="success" class="success"></div>
    
    <form id="resetForm">
      <label>New Password</label>
      <div class="password-group">
        <input type="password" id="password" placeholder="Enter new password" required minlength="8" />
        <button type="button" class="toggle-pwd" onclick="togglePassword('password')">👁️</button>
      </div>
      <div class="password-strength">
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <span id="strengthText" style="color:#64748b;">Password strength: <span id="strengthLabel">-</span></span>
      </div>

      <label>Confirm Password</label>
      <div class="password-group">
        <input type="password" id="confirmPassword" placeholder="Confirm new password" required minlength="8" />
        <button type="button" class="toggle-pwd" onclick="togglePassword('confirmPassword')">👁️</button>
      </div>
      
      <button type="submit" id="submitBtn">Reset Password</button>
    </form>

    <div class="back-link">
      <a href="/">← Back to Sign In</a>
    </div>
  </div>

  <script src="{% static 'js/reset-password.js' %}"></script>
</body>
</html>
