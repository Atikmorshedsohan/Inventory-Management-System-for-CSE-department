<!doctype html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CSE Inventory — Forgot Password</title>
  <link rel="stylesheet" href="{% static 'css/forgot-password.css' %}">
</head>
<body>
  <div class="card">
    <div class="icon">🔒</div>
    <h1>Forgot Password?</h1>
    <p class="lead">No worries! Enter your email address and we'll send you instructions to reset your password.</p>
    
    <div id="error" class="error"></div>
    <div id="success" class="success"></div>
    
    <form id="forgotForm">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="Enter your email address" required autofocus />
      
      <button type="submit" id="submitBtn">Send Reset Link</button>
    </form>

    <div class="back-link">
      <a href="/">← Back to Sign In</a>
    </div>
  </div>

  <script src="{% static 'js/forgot-password.js' %}"></script>
</body>
</html>
